<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importadas | HC Futbol</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
    body { 
        font-family: 'Roboto', sans-serif; 
        margin: 0; 
        background: #F2E8CF; 
        color: #333;
        scroll-behavior: smooth;
    }

    /* --- 1. BARRA LOGO --- */
    .top-bar-logo {
        background: #F2E8CF;
        padding: 15px 5%;
        display: flex;
        justify-content: center;
        align-items: center;
        border-bottom: 1px solid #e0d8c3;
    }
    .top-bar-logo h1 { 
        margin: 0; 
        font-size: 2.2rem; 
        color: #2E8B57; 
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    /* --- 2. HEADER/NAV --- */
    header { 
        background: #2E8B57; 
        color: white; 
        padding: 10px 5%; 
        display: flex; 
        justify-content: space-between; 
        align-items: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        position: sticky;
        top: 0;
        z-index: 1001;
    }

    .main-nav { display: flex; gap: 20px; align-items: center; }
    .main-nav a {
        color: white; text-decoration: none; font-weight: bold;
        font-size: 0.9rem; text-transform: uppercase; transition: 0.3s;
    }
    .main-nav a:hover { color: #F2E8CF; }

    .dropdown { position: relative; display: inline-block; }
    .dropbtn { 
        background: transparent; color: white; border: none; 
        cursor: pointer; font-weight: bold; font-size: 0.9rem;
        font-family: 'Roboto', sans-serif; text-transform: uppercase;
    }
    .dropdown-content {
        display: none; position: absolute; left: 0; 
        background: white; min-width: 220px;
        box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        z-index: 1000; border-radius: 8px; overflow: hidden;
        margin-top: 10px;
    }
    .dropdown-content a {
        color: #333; padding: 12px 20px; text-decoration: none;
        display: block; border-bottom: 1px solid #eee; text-transform: none;
    }
    .dropdown-content a:hover { background: #F2E8CF; }
    
    .dropdown:hover .dropdown-content,
    .dropdown.active .dropdown-content { display: block; }

    .btn-carrito-nav {
        background: #e67e22; color: white; border: none;
        padding: 10px 20px; border-radius: 50px;
        cursor: pointer; font-weight: bold; transition: 0.3s;
    }

    /* --- PRODUCTOS --- */
    .seccion-titulo { text-align: center; padding: 40px 0 20px; font-size: 2.2rem; color: #2E8B57; text-transform: uppercase; }
    .container { 
        max-width: 1200px; margin: auto; padding: 20px; 
        display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; 
    }
    .producto { 
        background: white; padding: 25px; border-radius: 20px; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; transition: 0.3s;
        position: relative;
    }
    .producto:hover { transform: translateY(-10px); }
    .producto img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
    
    /* Estilos Oferta */
    .badge-oferta {
        position: absolute; top: 15px; left: 15px;
        background: #e67e22; color: white; padding: 5px 15px;
        border-radius: 50px; font-weight: 900; font-size: 0.8rem;
        z-index: 10;
    }
    .precio-antes {
        text-decoration: line-through; color: #999;
        font-size: 1rem; margin-right: 10px; font-weight: bold;
    }

    .select-talle {
        width: 100%; padding: 12px; margin: 15px 0;
        border-radius: 10px; border: 2px solid #2E8B57;
        font-weight: bold; cursor: pointer; background-color: #fff;
        font-family: 'Roboto', sans-serif;
    }

    .btn-accion {
        padding: 15px; border-radius: 10px; cursor: pointer;
        width: 100%; font-weight: bold; text-transform: uppercase;
        border: none; transition: 0.3s; margin-bottom: 10px;
        font-size: 0.85rem; letter-spacing: 1px;
    }
    .btn-ver-producto { background: #1E5D3D; color: white; }
    .btn-ver-producto:hover { background: #2E8B57; }
    .btn-agregar-carrito { background: #333; color: white; }
    .btn-agregar-carrito:hover { background: #000; }

    /* --- MODAL --- */
    .modal {
        display: none; position: fixed; z-index: 2000; left: 0; top: 0;
        width: 100%; height: 100%; background-color: rgba(0,0,0,0.8);
    }
    .modal-content {
        background-color: white; margin: 5% auto; padding: 25px;
        border-radius: 15px; width: 90%; max-width: 450px; text-align: center; position: relative;
    }
    .cerrar-modal { position: absolute; right: 20px; top: 10px; font-size: 30px; cursor: pointer; }
    .modal-img { width: 100%; border-radius: 10px; margin: 15px 0; }

    footer { background: #333; color: white; text-align: center; padding: 30px; margin-top: 50px; }
</style>
</head>
<body>

<div class="top-bar-logo">
    <h1>HC Futbol</h1>
</div>

<header>
    <nav class="main-nav">
        <a href="index.html">Inicio</a>
        <div class="dropdown" id="dropdownCategorias">
            <button class="dropbtn" onclick="toggleDropdown(event)">Categorías ▼</button>
            <div class="dropdown-content">
                <a href="camisetas-importadas.html">Camisetas Importadas</a>
                <a href="camisetas-nacionales.html">Camisetas Nacionales</a>
                <a href="camisetas-ninos.html">Camisetas De Niño</a>
                <a href="shorts.html">Shorts</a>
                <a href="buzos.html">Buzos</a>
                <a href="camperas.html">Camperas</a>
                <a href="conjuntos.html">Conjuntos</a>
            </div>
        </div>
        <a href="ofertas.html">Ofertas</a>
    </nav>
    <button class="btn-carrito-nav" onclick="enviarPedido()">
        🛒 Carrito (<span id="contador-carrito">0</span>)
    </button>
</header>

<h2 class="seccion-titulo">🌍 Catálogo Calidad Importada</h2>

<div class="container" id="lista-productos"></div>

<div id="miModal" class="modal">
    <div class="modal-content">
        <span class="cerrar-modal" onclick="cerrarDetalles()">&times;</span>
        <h2 id="modal-titulo"></h2>
        <img id="modal-img" src="" class="modal-img">
        <p><strong>Precio:</strong> <span id="modal-precio"></span></p>
        <p style="color: #666; font-size: 0.9rem;">Calidad G5 Premium: Tecnología dry-fit y detalles de alta definición.</p>
        <button class="btn-accion btn-agregar-carrito" id="btn-modal-agregar">Añadir al Carrito</button>
    </div>
</div>

<footer>
    <p>&copy; 2026 HC Futbol - Calidad Premium</p>
</footer>

<script>
    const productos = [
        { id: 32, nombre: "Camiseta Importada Liverpool Retro 93/95", precio: 50000, img: "liverpool-retro.jpg", stock: { S: false, M: false, L: false, XL: false, XXL: false } },
        { id: 33, nombre: "Camiseta V. Fan Boca Juniors 3era", precio: 40000, img: "boca-3ra.jpg", stock: { S: false, M: false, L: true, XL: false, XXL: false } },
        { id: 1, nombre: "Camiseta V. Jugador Argentina Titular 2026", precio: 50000, img: "camiseta-seleccion.jpg", stock: { S: false, M: true, L: true, XL: true, XXL: false } },
        { id: 2, nombre: "Camiseta V. Jugador River Plate 2026", precio: 50000, img: "river-titular-2026.jpg", stock: { S: false, M: false, L: false, XL: false, XXL: false } },
        { id: 3, nombre: "Camiseta V. Fan Boca Jrs. 2026", precio: 40000, img: "boca-titular-2026.jpg", stock: { S: false, M: false, L: false, XL: false, XXL: false } },
        { id: 4, nombre: "Camiseta V. Jugador Real Madrid Titular 2026", precio: 50000, img: "real-madrid-titular-2026.jpg", stock: { S: false, M: false, L: true, XL: false, XXL: false } },
        { id: 5, nombre: "Camiseta V. Jugador Barcelona Titular 2026", precio: 50000, img: "barcelona-titular-2026.jpg", stock: { S: false, M: false, L: true, XL: false, XXL: false } },
        { id: 6, nombre: "Camiseta V. Jugador Liverpool Alt. 2026", precio: 50000, img: "liverpool-alt-2026.jpg", stock: { S: false, M: true, L: false, XL: false, XXL: false } },
        { id: 7, nombre: "Camiseta V. Jugador Barca Total 90 2026", precio: 50000, img: "barca-total90-2026.jpg", stock: { S: false, M: false, L: false, XL: false, XXL: false } },
        { id: 8, nombre: "Camiseta V. Jugador PSG Alt. 2026", precio: 50000, img: "psg-alt-2026.jpg", stock: { S: false, M: true, L: false, XL: false, XXL: false } },
        { id: 9, nombre: "Camiseta V. Jugador Real Madrid Alt. 2026", precio: 50000, img: "real-madrid-alt-2026.jpg", stock: { S: false, M: true, L: false, XL: false, XXL: false } },
        { id: 10, nombre: "Camiseta V. Jugador Liverpool 3ra", precio: 50000, img: "liverpool-3ra.jpg", stock: { S: false, M: false, L: false, XL: false, XXL: false } },
        { id: 11, nombre: "Camiseta V. Jugador Seleccion Japon 2026", precio: 50000, img: "japon-2026.jpg", stock: { S: false, M: false, L: true, XL: false, XXL: false } },
        { id: 12, nombre: "Camiseta V. Jugador San Lorenzo Titular", precio: 50000, img: "san-lorenzo-titular.jpg", stock: { S: false, M: false, L: true, XL: false, XXL: false } },
        { id: 13, nombre: "Camiseta V. Jugador Arsenal Alt. 2026", precio: 50000, img: "arsenal-alt-2026.jpg", stock: { S: false, M: true, L: true, XL: false, XXL: false } },
        { id: 14, nombre: "Camiseta V. Jugador Roma Alt. 2026", precio: 50000, img: "roma-alt-2026.jpg", stock: { S: false, M: false, L: false, XL: true, XXL: false } },
        { id: 15, nombre: "Camiseta V. Jugador Barca Alt. 2025 (Cactus Jack)", precio: 50000, img: "barca-cactus-jack.jpg", stock: { S: false, M: false, L: false, XL: false, XXL: false } },
        { id: 16, nombre: "Camiseta V. Jugador Chelsea Titular 2026", precio: 50000, img: "chelsea-titular-2026.jpg", stock: { S: false, M: true, L: true, XL: false, XXL: false } },
        { id: 17, nombre: "Camiseta V. Jugador Chelsea Total 90 2026", precio: 50000, img: "chelsea-total90-2026.jpg", stock: { S: false, M: false, L: true, XL: false, XXL: false } },
        { id: 18, nombre: "Camiseta V. Jugador Chelsea Alt. 2026", precio: 50000, img: "chelsea-alt-2026.jpg", stock: { S: false, M: false, L: false, XL: false, XXL: false } },
        { id: 19, nombre: "Camiseta V. Jugador Inter de Milan Titular 2026", precio: 50000, img: "inter-titular-2026.jpg", stock: { S: false, M: true, L: false, XL: false, XXL: false } },
        { id: 20, nombre: "Camiseta V. Jugador Milan Titular 2007", precio: 50000, img: "milan-titular-2007.jpg", stock: { S: false, M: false, L: true, XL: false, XXL: false } },
        { id: 21, nombre: "Camiseta V. Jugador Milan Alt. 2007", precio: 50000, img: "milan-alt-2007.jpg", stock: { S: false, M: true, L: false, XL: true, XXL: false } },
        { id: 22, nombre: "Camiseta V. Jugador Manchester Udt. 2008", precio: 50000, img: "manchester-2008.jpg", stock: { S: false, M: false, L: false, XL: false, XXL: false } },
        { id: 23, nombre: "Camiseta V. Jugador Real Madrid Titular 2009", precio: 50000, img: "real-madrid-2009.jpg", stock: { S: false, M: true, L: false, XL: false, XXL: false } },
        { id: 24, nombre: "Camiseta V. Jugador Barcelona Titular 2015", precio: 50000, img: "barcelona-titular-2015.jpg", stock: { S: false, M: false, L: false, XL: false, XXL: false } },
        { id: 25, nombre: "Camiseta V. Fan Barcelona 3ra 2025", precio: 40000, img: "barcelona-3ra-2025.jpg", stock: { S: false, M: false, L: false, XL: false, XXL: false } },
        { id: 26, nombre: "Camiseta V. Fan Santos Alt. 2026", precio: 40000, img: "santos-alt-2026.jpg", stock: { S: false, M: false, L: true, XL: false, XXL: false } },
        { id: 27, nombre: "Camiseta V. Fan Inter de Porto Alegre Titular 2025", precio: 40000, img: "inter-porto-titular-2025.jpg", stock: { S: false, M: true, L: false, XL: false, XXL: false } },
        { id: 28, nombre: "Camiseta V. Fan Holanda Alt. 2026", precio: 40000, img: "holanda-alt-2026.jpg", stock: { S: true, M: false, L: true, XL: false, XXL: false } },
        { id: 29, nombre: "Camiseta V. Fan Boca Juniors Alt. 2026", precio: 40000, img: "boca-alt-2026.jpg", stock: { S: false, M: false, L: true, XL: false, XXL: false } },
        { id: 30, nombre: "Camiseta V. Fan River Plate Alt. 2026", precio: 40000, img: "river-alt-2026.jpg", stock: { S: false, M: false, L: false, XL: false, XXL: false } },
        { id: 31, nombre: "Camiseta V. Fan Flamengo Alt. 2024", precio: 30000, precioAnterior: 40000, oferta: true, img: "flamengo-2024.jpg", stock: { S: true, M: false, L: false, XL: false, XXL: false } }
    ];

    let carrito = [];

    function toggleDropdown(event) {
        event.stopPropagation();
        const dropdown = document.getElementById('dropdownCategorias');
        dropdown.classList.toggle('active');
    }

    function cargarProductos() {
        const contenedor = document.getElementById('lista-productos');
        contenedor.innerHTML = '';
        productos.forEach(p => {
            const div = document.createElement('div');
            div.className = 'producto';
            
            let badge = p.oferta ? `<div class="badge-oferta">OFERTA</div>` : '';
            let precioHTML = p.oferta 
                ? `<p style="color:#2E8B57; font-size:1.5rem; font-weight:900"><span class="precio-antes">$${p.precioAnterior.toLocaleString()}</span>$${p.precio.toLocaleString()}</p>`
                : `<p style="color:#2E8B57; font-size:1.5rem; font-weight:900">$${p.precio.toLocaleString()}</p>`;

            let opcionesTalles = `<select class="select-talle" id="talle-${p.id}"><option value="">Elegir Talle</option>`;
            for (const [talle, disponible] of Object.entries(p.stock)) {
                opcionesTalles += `<option value="${talle}" ${disponible ? '' : 'disabled'}>${talle} ${disponible ? '' : '(Agotado)'}</option>`;
            }
            opcionesTalles += `</select>`;

            div.innerHTML = `
                ${badge}
                <img src="${p.img}" alt="${p.nombre}">
                <h3>${p.nombre}</h3>
                ${precioHTML}
                ${opcionesTalles}
                <button class="btn-accion btn-ver-producto" onclick="verProducto('${p.nombre}', ${p.precio}, '${p.img}')">Ver Producto</button>
                <button class="btn-accion btn-agregar-carrito" onclick="agregarAlCarrito(${p.id})">Añadir al Carrito</button>
            `;
            contenedor.appendChild(div);
        });
    }

    function agregarAlCarrito(id) {
        const producto = productos.find(p => p.id === id);
        const talle = document.getElementById(`talle-${id}`).value;
        if (!talle) { alert("Por favor, seleccioná un talle."); return; }
        
        carrito.push({ nombre: producto.nombre, precio: producto.precio, talle: talle });
        localStorage.setItem('carrito', JSON.stringify(carrito));
        actualizarContador();
        alert(`¡Agregaste ${producto.nombre} talle ${talle}!`);
    }

    function actualizarContador() {
        document.getElementById('contador-carrito').innerText = carrito.length;
    }

    function verProducto(nombre, precio, img) {
        document.getElementById('modal-titulo').innerText = nombre;
        document.getElementById('modal-precio').innerText = "$" + precio.toLocaleString();
        document.getElementById('modal-img').src = img;
        document.getElementById('miModal').style.display = "block";
    }

    function cerrarDetalles() { document.getElementById('miModal').style.display = "none"; }

    function enviarPedido() {
        if (carrito.length === 0) { alert("Tu carrito está vacío."); return; }
        let msj = "Hola HC Futbol! Quiero realizar este pedido de Calidad Importada:%0A%0A";
        let total = 0;
        carrito.forEach((i, idx) => {
            msj += `${idx + 1}. ${i.nombre} - *Talle: ${i.talle}* ($${i.precio.toLocaleString()})%0A`;
            total += i.precio;
        });
        msj += `%0A*TOTAL A PAGAR: $${total.toLocaleString()}*`;
        
        localStorage.removeItem('carrito');
        carrito = [];
        actualizarContador();

        window.open(`https://wa.me/543584237914?text=${msj}`, '_blank');
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById('miModal')) cerrarDetalles();
        const dropdown = document.getElementById('dropdownCategorias');
        if (!event.target.matches('.dropbtn')) {
            dropdown.classList.remove('active');
        }
    }

    window.onload = function() {
        const carritoGuardado = localStorage.getItem('carrito');
        if (carritoGuardado) {
            carrito = JSON.parse(carritoGuardado);
            actualizarContador();
        }
        cargarProductos();
    };
</script>
</body>
</html>
